version: '3.9'

services:
  db:
    image: postgres:16.1
    container_name: shareit-db
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=shareit
      - POSTGRES_USER=shareit_user
      - POSTGRES_PASSWORD=shareit123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shareit_user -d shareit"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shareit-network

  server:
    build:
      context: ./shareit-server
      dockerfile: Dockerfile
    container_name: shareit-server
    ports:
      - "9090:9090"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shareit
      SPRING_DATASOURCE_USERNAME: shareit_user
      SPRING_DATASOURCE_PASSWORD: shareit123
    networks:
      - shareit-network

  gateway:
    build:
      context: ./shareit-gateway
      dockerfile: Dockerfile
    container_name: shareit-gateway
    ports:
      - "8080:8080"
    depends_on:
      server:
        condition: service_started
    environment:
      SHAREIT_SERVER_URL: http://server:9090
    networks:
      - shareit-network

networks:
  shareit-network:
    driver: bridge